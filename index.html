<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testofy Protocol — Free ED Assessment</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23F97316'/><text x='16' y='23' font-family='Arial,sans-serif' font-size='20' font-weight='bold' fill='white' text-anchor='middle'>T</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange-primary: #F97316;
      --orange-dark:    #EA580C;
      --orange-deeper:  #C2410C;
      --orange-light:   #FFF7ED;
      --orange-mid:     #FED7AA;
      --grey-100:       #F9FAFB;
      --grey-200:       #E5E7EB;
      --grey-400:       #9CA3AF;
      --grey-600:       #6B7280;
      --grey-800:       #1F2937;
      --white:          #FFFFFF;
      --radius:         14px;
      --shadow:         0 4px 28px rgba(249,115,22,.13);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--grey-100);
      color: var(--grey-800);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ── */
    .header {
      width: 100%;
      background: var(--white);
      border-bottom: 1px solid var(--grey-200);
      display: flex;
      justify-content: center;
      padding: 18px 24px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: var(--orange-primary);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 22px; height: 22px; fill: white; }
    .logo-text { font-size: 1.2rem; font-weight: 800; color: var(--grey-800); letter-spacing: -.5px; }
    .logo-text span { color: var(--orange-primary); }

    /* ── WRAPPER ── */
    .wrapper {
      width: 100%; max-width: 660px;
      padding: 32px 16px 60px;
      display: flex; flex-direction: column; align-items: center; gap: 0;
    }

    /* ── PROGRESS ── */
    .progress-area {
      width: 100%; margin-bottom: 20px;
    }
    .progress-meta {
      display: flex; justify-content: space-between;
      font-size: .8rem; font-weight: 600; color: var(--grey-400);
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      width: 100%; height: 8px;
      background: var(--grey-200); border-radius: 99px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--orange-primary);
      border-radius: 99px;
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }

    /* ── GO BACK ── */
    .back-btn {
      width: 100%; display: flex; align-items: center; gap: 5px;
      background: none; border: none; cursor: pointer;
      color: var(--grey-400); font-size: .8rem; font-weight: 600;
      font-family: inherit; padding: 0 0 12px 0;
      transition: color .2s;
    }
    .back-btn:hover { color: var(--grey-600); }
    .back-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .back-btn.hidden { visibility: hidden; pointer-events: none; }

    /* ── CARD ── */
    .card {
      width: 100%;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 32px;
      animation: fadeUp .35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .question-label {
      font-size: .72rem; font-weight: 700;
      color: var(--orange-primary); letter-spacing: .09em;
      text-transform: uppercase; margin-bottom: 10px;
    }
    .question-text {
      font-size: 1.22rem; font-weight: 700;
      color: var(--grey-800); line-height: 1.45;
      margin-bottom: 26px;
    }

    /* ── OPTIONS ── */
    .options { display: flex; flex-direction: column; gap: 11px; }

    .option {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px;
      border: 2px solid var(--grey-200);
      border-radius: 10px;
      cursor: pointer;
      background: var(--white);
      transition: border-color .18s, background .18s, transform .14s;
      font-size: .94rem; font-weight: 500; color: var(--grey-800);
      text-align: left; width: 100%; font-family: 'Playfair Display', Georgia, serif;
    }
    .option:hover {
      border-color: var(--orange-primary);
      background: var(--orange-light);
      transform: translateX(3px);
    }
    .option.selected {
      border-color: var(--orange-primary);
      background: var(--orange-light);
    }
    .option-bullet {
      width: 21px; height: 21px; min-width: 21px;
      border-radius: 50%;
      border: 2px solid var(--grey-400);
      display: flex; align-items: center; justify-content: center;
      transition: border-color .18s, background .18s;
      flex-shrink: 0;
    }
    .option.selected .option-bullet {
      border-color: var(--orange-primary);
      background: var(--orange-primary);
    }
    .option.selected .option-bullet::after {
      content: '';
      width: 7px; height: 7px;
      background: white; border-radius: 50%;
    }

    /* ── YES/NO ── */
    .yn-options { display: flex; gap: 14px; }
    .yn-btn {
      flex: 1; padding: 22px 10px;
      border-radius: 12px; border: 2.5px solid var(--grey-200);
      background: var(--white); cursor: pointer;
      font-size: 1rem; font-weight: 700; font-family: inherit;
      transition: all .2s;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      color: var(--grey-800);
    }
    .yn-btn .yn-icon { font-size: 1.8rem; }
    .yn-btn.yes:hover, .yn-btn.yes.selected {
      border-color: var(--orange-primary); background: var(--orange-light);
      color: var(--orange-dark);
      transform: translateY(-3px);
      box-shadow: 0 6px 22px rgba(249,115,22,.20);
    }
    .yn-btn.no:hover, .yn-btn.no.selected {
      border-color: var(--grey-400); background: var(--grey-100);
      color: var(--grey-600);
    }

    /* ── INTERMEDIATE MESSAGE ── */
    .mid-card {
      width: 100%;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 32px;
      text-align: center;
      animation: fadeUp .45s ease both;
    }
    .mid-icon {
      width: 72px; height: 72px;
      background: var(--orange-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 2.2rem;
    }
    .mid-badge {
      display: inline-block;
      background: #FFEDD5; color: var(--orange-dark);
      font-size: .76rem; font-weight: 700;
      padding: 4px 12px; border-radius: 99px;
      letter-spacing: .07em; text-transform: uppercase;
      margin-bottom: 16px;
    }
    .mid-title {
      font-size: 1.5rem; font-weight: 800;
      color: var(--grey-800); line-height: 1.35;
      margin-bottom: 14px;
    }
    .mid-title span { color: var(--orange-primary); }
    .mid-body {
      font-size: .96rem; color: var(--grey-600);
      line-height: 1.68; margin-bottom: 24px;
    }
    .mid-highlights {
      display: flex; flex-direction: column; gap: 10px;
      background: var(--grey-100); border-radius: 10px;
      padding: 18px 20px; margin-bottom: 28px; text-align: left;
    }
    .mid-highlight-item {
      display: flex; align-items: center; gap: 10px;
      font-size: .88rem; font-weight: 500; color: var(--grey-800);
    }
    .mid-highlight-item .dot {
      width: 8px; height: 8px; min-width: 8px;
      background: var(--orange-primary); border-radius: 50%;
    }
    .btn-continue {
      width: 100%; padding: 16px;
      background: var(--orange-primary); color: white;
      font-size: 1rem; font-weight: 700; font-family: inherit;
      border: none; border-radius: 10px; cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
    }
    .btn-continue:hover {
      background: var(--orange-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(249,115,22,.30);
    }

    /* ── FINAL RESULT ── */
    .result-card {
      width: 100%;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 32px;
      text-align: center;
      animation: fadeUp .45s ease both;
    }
    .result-icon { font-size: 3rem; margin-bottom: 16px; }
    .result-badge {
      display: inline-block;
      background: #FFEDD5; color: var(--orange-dark);
      font-size: .76rem; font-weight: 700;
      padding: 4px 14px; border-radius: 99px;
      letter-spacing: .07em; text-transform: uppercase;
      margin-bottom: 18px;
    }
    .result-title {
      font-size: 1.5rem; font-weight: 800;
      color: var(--grey-800); line-height: 1.35; margin-bottom: 14px;
    }
    .result-title span { color: var(--orange-primary); }
    .result-body {
      font-size: .94rem; color: var(--grey-600);
      line-height: 1.72; margin-bottom: 26px;
    }
    .result-features {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-bottom: 28px;
    }
    .result-feature {
      background: var(--orange-light);
      border-radius: 10px; padding: 14px 12px;
      font-size: .83rem; font-weight: 600; color: var(--orange-dark);
      text-align: center;
    }
    .result-feature .f-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }
    .btn-cta {
      width: 100%; padding: 18px;
      background: var(--orange-primary); color: white;
      font-size: 1.05rem; font-weight: 800; font-family: inherit;
      border: none; border-radius: 10px; cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
    }
    .btn-cta:hover {
      background: var(--orange-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(249,115,22,.35);
    }
    .cta-sub {
      font-size: .79rem; color: var(--grey-400);
      margin-top: 12px;
    }

    /* ── TRUST BAR ── */
    .trust-bar {
      width: 100%; max-width: 660px;
      padding: 0 16px;
      display: flex; justify-content: center; gap: 24px;
      flex-wrap: wrap; margin-top: 24px;
    }
    .trust-item {
      display: flex; align-items: center; gap: 6px;
      font-size: .77rem; color: var(--grey-400); font-weight: 500;
    }
    .trust-item svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .card, .mid-card, .result-card { padding: 26px 18px; }
      .question-text { font-size: 1.08rem; }
      .result-features { grid-template-columns: 1fr; }
      .yn-options { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <a class="logo" href="#">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2a5 5 0 1 1 0 10A5 5 0 0 1 12 2zm0 12c-4.42 0-8 1.79-8 4v2h16v-2c0-2.21-3.58-4-8-4z"/>
        </svg>
      </div>
      <span class="logo-text">Testofy <span>Protocol</span></span>
    </a>
  </header>

  <!-- MAIN -->
  <main class="wrapper">
    <div class="progress-area" id="progressArea">
      <button class="back-btn hidden" id="backBtn" onclick="goBack()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Go back
      </button>
      <div class="progress-meta">
        <span id="progressLabel">Question 1 of 13</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div id="quizContainer"></div>
  </main>

  <!-- TRUST BAR -->
  <div class="trust-bar">
    <div class="trust-item">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      100% safe &amp; free
    </div>
    <div class="trust-item">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      Your answers are private
    </div>
    <div class="trust-item">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      Takes less than 2 minutes
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────
    //  TESTOFY — ADAPTIVE QUIZ ENGINE
    //  Branching by age, associated conditions,
    //  libido, severity and treatment history.
    // ─────────────────────────────────────────────

    var TOTAL_Q  = 13;
    var CHECKOUT = 'https://pay.hotmart.com/B104929784U?checkoutMode=10';

    // A[qId] key map:
    // q1  = age        (0=18-29, 1=30-39, 2=40-49, 3=50+)
    // q2  = duration   (0=<6mo,  1=6-12mo, 2=1-3yr, 3=3yr+)
    // q3  = severity   (0=mild,  1=moderate, 2=severe, 3=complete)
    // q4  = frequency  (0=rarely,1=sometimes,2=often,3=always)
    // q5  = impact     (0=greatly,1=anxiety,2=rarely,3=not yet)
    // q6  = condition  (0=diabetes,1=BP/cardio,2=stress/anxiety,3=none)
    // q7a/q7b/q7c = branched
    // q8  = libido     (0=significant drop,1=moderate,2=rarely,3=normal)
    // q9  = comparison (0=much worse,1=somewhat worse,2=same,3=just started)
    // q10 = prev treat (0=no results,1=side effects,2=partial,3=never)
    // q11/q12/q13 = yesno (0=yes, 1=no)

    var A        = {};
    var qHistory = [];
    var currentQId = 'q1';
    var advancing  = false;

    // ── helpers ──
    function age()    { return A.q1 !== undefined ? A.q1 : 1; }
    function dur()    { return A.q2 !== undefined ? A.q2 : 0; }
    function sev()    { return A.q3 !== undefined ? A.q3 : 1; }
    function freq()   { return A.q4 !== undefined ? A.q4 : 1; }
    function impact() { return A.q5 !== undefined ? A.q5 : 2; }
    function cond()   { return A.q6 !== undefined ? A.q6 : 3; }
    function prev()   { return A.q10 !== undefined ? A.q10 : 3; }

    function isYoung()      { return age() === 0; }           // 18-29
    function isSenior()     { return age() >= 2; }            // 40+
    function hasPhysical()  { return cond() === 0 || cond() === 1; }
    function hasStress()    { return cond() === 2; }
    function noConditions() { return cond() === 3; }

    // ── question map ──
    var Q = {

      // ── Q1 — Age (anchor for everything) ──
      q1: {
        text: 'What is your age range?',
        type: 'choice',
        options: ['18–29 years old', '30–39 years old', '40–49 years old', '50 years or older'],
        next: function() { return 'q2'; }
      },

      // ── Q2 — Duration ──
      q2: {
        text: 'How long have you been experiencing difficulty getting or maintaining an erection?',
        type: 'choice',
        options: ['Less than 6 months', '6 months to 1 year', '1 to 3 years', 'More than 3 years'],
        next: function() { return 'q3'; }
      },

      // ── Q3 — Severity (adaptive if long duration) ──
      q3: {
        text: function() {
          return dur() >= 2
            ? "Given how long you've been dealing with this — how would you describe the severity today?"
            : 'How would you describe the severity of your erectile difficulties?';
        },
        type: 'choice',
        options: [
          'Mild — occasional difficulty, mostly able to perform',
          'Moderate — difficulty in about half of attempts',
          'Severe — rarely able to achieve a full erection',
          'Complete — unable to achieve an erection'
        ],
        next: function() { return 'q4'; }
      },

      // ── Q4 — Frequency (text adapts to severity) ──
      q4: {
        text: function() {
          return sev() >= 2
            ? 'How often does this happen when you want to be intimate?'
            : 'How often do you experience difficulty getting or maintaining an erection?';
        },
        type: 'choice',
        options: [
          'Rarely — less than 25% of the time',
          'Sometimes — around 50% of the time',
          'Often — 75% or more of the time',
          'Almost always — nearly every time'
        ],
        next: function() { return 'q5'; }
      },

      // ── Q5 — Emotional / relationship impact (adapts to age) ──
      q5: {
        text: function() {
          if (isYoung()) return 'Has this affected your confidence with partners or caused tension in your relationship?';
          if (isSenior()) return 'Has this situation affected your self-esteem or your sense of masculinity?';
          return 'Has erectile dysfunction affected your self-esteem, confidence or relationship?';
        },
        type: 'choice',
        options: function() {
          if (isYoung()) return [
            "Yes — it's caused real strain in my relationship",
            'Yes — I feel anxious and have started avoiding intimacy',
            'Somewhat — it has crossed my mind a few times',
            "Not yet — I'm acting before it gets worse"
          ];
          return [
            'Yes — it has greatly impacted my life and confidence',
            'Sometimes it causes anxiety and I avoid situations',
            'Rarely — but I have noticed some impact',
            'Not yet — but I want to address it before it gets worse'
          ];
        },
        next: function() { return 'q6'; }
      },

      // ── Q6 — Associated conditions → bifurcates Q7 ──
      q6: {
        text: 'Do you have any of the following?',
        type: 'choice',
        options: [
          'Diabetes or high blood sugar',
          'High blood pressure or cardiovascular issues',
          'Chronic stress, anxiety or depression',
          'None of the above'
        ],
        next: function() {
          if (hasPhysical()) return 'q7a';
          if (hasStress())   return 'q7b';
          return 'q7c';
        }
      },

      // ── Q7a — Physical condition (diabetes / BP) ──
      q7a: {
        text: function() {
          return cond() === 0
            ? 'Are you currently managing your blood sugar with medication or insulin?'
            : 'Are you currently on medication for blood pressure or heart health?';
        },
        type: 'choice',
        options: [
          'Yes — and I suspect it may be affecting my sexual function',
          "Yes — but I haven't noticed a direct connection",
          'No — I manage it through diet and lifestyle',
          'No medication yet, but the condition is there'
        ],
        next: function() { return 'q8'; }
      },

      // ── Q7b — Stress / anxiety / depression ──
      q7b: {
        text: 'Do you notice your difficulties are worse during periods of high stress or low mood?',
        type: 'choice',
        options: [
          "Yes — it's clearly worse when I'm stressed or anxious",
          "Yes — but I can't tell if it's stress or something physical",
          'Sometimes — but it also happens when I feel relaxed',
          'Not really — it seems consistent regardless of my mood'
        ],
        next: function() { return 'q8'; }
      },

      // ── Q7c — No associated conditions (adapts to age) ──
      q7c: {
        text: function() {
          return isSenior()
            ? 'Do you still experience morning erections, or have they disappeared?'
            : 'Have you noticed your morning erections becoming weaker or less frequent?';
        },
        type: 'choice',
        options: function() {
          return isSenior()
            ? [
              'No — morning erections have disappeared completely',
              'Rarely — very weak when they do happen',
              'Sometimes — but much weaker than before',
              'Yes — I still get them fairly regularly'
            ]
            : [
              "Yes — they're much weaker or have stopped altogether",
              'A little weaker, but still present sometimes',
              'About the same as always',
              "I've never paid much attention to that"
            ];
        },
        next: function() { return 'q8'; }
      },

      // ── Q8 — Libido (adapts to age + severity) ──
      q8: {
        text: function() {
          if (isYoung())  return 'Have you also noticed a drop in sexual desire or drive along with the erection issues?';
          if (isSenior()) return 'Along with erection difficulties — have you noticed a significant drop in sexual desire or overall energy?';
          return 'Do you notice a significant drop in sexual desire or libido along with the erection difficulties?';
        },
        type: 'choice',
        options: function() {
          if (isSenior()) return [
            'Yes — both desire and energy have dropped significantly',
            'Mostly the erection — desire is still there',
            'My desire has dropped a little',
            'No — desire is normal, erection is the only issue'
          ];
          return [
            'Yes — my libido has dropped significantly',
            'Yes — but only moderately',
            'Rarely — desire is mostly normal',
            'No — desire is fine, erection is the only issue'
          ];
        },
        next: function() { return 'q9'; }
      },

      // ── Q9 — Performance comparison (adapts to age) ──
      q9: {
        text: function() {
          return isYoung()
            ? 'How does your sexual performance compare to 1–2 years ago?'
            : 'How does your sexual performance compare to 2–3 years ago?';
        },
        type: 'choice',
        options: [
          'Much worse — significant decline',
          'Somewhat worse — noticeable but manageable',
          "About the same — hasn't changed much",
          'This is recent — I only just started noticing changes'
        ],
        next: function() { return 'q10'; }
      },

      // ── Q10 — Previous treatments → triggers mid message ──
      q10: {
        text: 'Have you ever tried any treatment for erectile dysfunction?',
        type: 'choice',
        options: [
          'Yes — but without satisfactory results',
          'Yes — but stopped due to side effects',
          'Yes — with some partial improvement',
          'No — this would be my first treatment'
        ],
        next: function() { return 'MID'; }
      },

      // ── Q11 — Adaptive opener (treatment history + age) ──
      q11: {
        text: function() {
          if (prev() === 0) return isYoung()
            ? "What if previous treatments didn't work because they weren't targeting the real root cause for someone your age? Would you be open to something more specific?"
            : "Most generic treatments fail because they don't address your individual profile. What if there was a protocol tailored exactly to your situation? Would you try it?";
          if (prev() === 1) return "What if you found a 100% natural protocol — no pharmaceutical side effects, no dependency — that actually delivered real results? Would you give it a chance?";
          if (prev() === 2) return "What if you could build on those partial results with a complete, targeted protocol that takes you all the way to full recovery? Interested?";
          return isSenior()
            ? "If you could start a proven, natural protocol this week that could restore your sexual confidence in 3 weeks — would you take that chance?"
            : "If you could start a completely natural, side-effect-free treatment this week and see real results in 3 weeks — would you give it a try?";
        },
        type: 'yesno',
        next: function() { return 'q12'; }
      },

      // ── Q12 — Commitment (duration + severity + age) ──
      q12: {
        text: function() {
          if (dur() >= 2 && sev() >= 2) return isYoung()
            ? "Even though you've been dealing with this for a while — would you commit just a few minutes a day to get your confidence and performance back?"
            : "Even after years of living with this — would you commit to a simple daily routine if it meant visible, lasting results in under a month?";
          if (dur() >= 2) return "You've been managing this for a while. If a natural protocol could reverse it in 21 days — would you take that chance?";
          if (isYoung()) return "You're catching this early — that's actually a huge advantage. Would you commit to a short daily routine to stop this before it gets worse?";
          return "Would you be willing to dedicate just a few minutes a day to a natural protocol that could restore your full performance in under a month?";
        },
        type: 'yesno',
        next: function() { return 'q13'; }
      },

      // ── Q13 — Final CTA (emotional impact + age) ──
      q13: {
        text: function() {
          if (impact() <= 1 && isYoung()) return "Are you ready to take back your confidence and your intimate life — starting this week?";
          if (impact() <= 1)              return "Are you ready to stop letting this control your confidence — and take real action starting today?";
          if (isSenior())                 return "Are you ready to reclaim your sexual vitality and start the Testofy Protocol this week?";
          return "Are you ready to take control and start recovering your performance this very week?";
        },
        type: 'yesno',
        next: function() { return 'RESULT'; }
      }
    };

    // ─────────────────────────────────────────────
    //  DOM references
    // ─────────────────────────────────────────────
    var container     = document.getElementById('quizContainer');
    var progressArea  = document.getElementById('progressArea');
    var progressFill  = document.getElementById('progressFill');
    var progressLabel = document.getElementById('progressLabel');
    var progressPct   = document.getElementById('progressPct');
    var backBtn       = document.getElementById('backBtn');

    function resolve(val) { return typeof val === 'function' ? val() : val; }
    function qNum()       { return qHistory.length + 1; }

    function updateProgress() {
      var n   = qNum();
      var pct = Math.round(((n - 1) / TOTAL_Q) * 100);
      progressFill.style.width  = pct + '%';
      progressLabel.textContent = 'Question ' + n + ' of ' + TOTAL_Q;
      progressPct.textContent   = pct + '%';
    }

    function showBack(vis) { backBtn.classList.toggle('hidden', !vis); }

    // ─────────────────────────────────────────────
    //  Render
    // ─────────────────────────────────────────────
    function renderQuestion(qId) {
      var q    = Q[qId];
      var text = resolve(q.text);
      var num  = qNum();

      updateProgress();
      showBack(qHistory.length > 0);
      advancing = false;

      if (q.type === 'choice') {
        var opts = resolve(q.options);
        container.innerHTML =
          '<div class="card">' +
            '<div class="question-label">Question ' + num + ' of ' + TOTAL_Q + '</div>' +
            '<div class="question-text">' + text + '</div>' +
            '<div class="options" id="options"></div>' +
          '</div>';

        var optsEl = document.getElementById('options');
        opts.forEach(function(opt, i) {
          var btn = document.createElement('button');
          btn.className = 'option';
          if (A[qId] === i) btn.classList.add('selected');
          btn.innerHTML = '<div class="option-bullet"></div><span>' + opt + '</span>';
          btn.onclick   = function() { selectAndAdvance(btn, i, qId); };
          optsEl.appendChild(btn);
        });

      } else {
        container.innerHTML =
          '<div class="card">' +
            '<div class="question-label">Question ' + num + ' of ' + TOTAL_Q + '</div>' +
            '<div class="question-text">' + text + '</div>' +
            '<div class="yn-options">' +
              '<button class="yn-btn yes" onclick="handleYesNo(\'yes\',\'' + qId + '\')">' +
                '<span class="yn-icon">&#x1F44D;</span>Yes, I want that!' +
              '</button>' +
              '<button class="yn-btn no" onclick="handleYesNo(\'no\',\'' + qId + '\')">' +
                '<span class="yn-icon">&#x274C;</span>No' +
              '</button>' +
            '</div>' +
          '</div>';
      }
    }

    // ─────────────────────────────────────────────
    //  Navigation
    // ─────────────────────────────────────────────
    function selectAndAdvance(btn, idx, qId) {
      if (advancing) return;
      advancing = true;
      document.querySelectorAll('.option').forEach(function(o) { o.classList.remove('selected'); });
      btn.classList.add('selected');
      A[qId] = idx;

      setTimeout(function() {
        var nextId = Q[qId].next();
        qHistory.push(currentQId);
        currentQId = nextId;
        if (nextId === 'MID') showMidMessage();
        else renderQuestion(nextId);
      }, 320);
    }

    function handleYesNo(val, qId) {
      if (advancing) return;
      advancing = true;
      A[qId] = (val === 'yes') ? 0 : 1;
      var sel = document.querySelector('.yn-btn.' + (val === 'yes' ? 'yes' : 'no'));
      if (sel) sel.classList.add('selected');

      setTimeout(function() {
        var nextId = Q[qId].next();
        qHistory.push(currentQId);
        currentQId = nextId;
        if (nextId === 'RESULT') showResult();
        else renderQuestion(nextId);
      }, 300);
    }

    function goBack() {
      if (qHistory.length === 0) return;
      var prevId = qHistory.pop();
      currentQId = prevId;
      if (prevId === 'MID') { showMidMessage(); return; }
      progressArea.style.display = 'block';
      renderQuestion(prevId);
    }

    // ─────────────────────────────────────────────
    //  Mid message — adaptive
    // ─────────────────────────────────────────────
    function showMidMessage() {
      progressArea.style.display = 'none';
      showBack(false);
      advancing = false;

      var titleInner, body, h1, h3;

      if (hasPhysical()) {
        titleInner = sev() >= 2
          ? 'a clear vascular cause — and that is actually good news'
          : 'a physical root cause that is highly treatable';
        body = cond() === 0
          ? "Blood sugar imbalances are one of the most well-documented — and most reversible — causes of erectile dysfunction. Targeting this connection with the right natural protocol can produce dramatic results, even when medications alone have fallen short."
          : "Cardiovascular health and erectile function are deeply linked. The good news is that improving blood flow and vascular health through the right natural protocol can restore your performance faster than most men expect.";
        h1 = prev() === 0
          ? 'Root cause identified — previous treatments missed the vascular connection'
          : 'Physical cause identified — highly responsive to natural treatment';
      } else if (hasStress()) {
        titleInner = 'a psychological root cause — the most reversible type';
        body = "Stress and anxiety are the leading cause of ED in men under 45 — and also the most treatable. When the nervous system is in a state of chronic stress, it actively suppresses the hormones needed for sexual function. The right natural protocol resets this cycle at the source.";
        h1 = prev() === 0
          ? 'Root cause identified — previous treatments missed the hormonal-stress connection'
          : 'Psychological component identified — responds very well to natural hormone regulation';
      } else {
        titleInner = isSenior()
          ? 'a hormonal pattern common after 40 — and fully reversible'
          : 'strong recovery potential — your body can respond quickly';
        body = isSenior()
          ? "After 40, testosterone and nitric oxide levels naturally decline — but this process is not irreversible. Men with a profile like yours consistently respond well to protocols that target these specific deficiencies at the root."
          : "With no underlying conditions, your case is driven by a hormonal or lifestyle imbalance that responds extremely well to targeted natural intervention. This is one of the most recoverable profiles we see.";
        h1 = prev() === 0
          ? 'Root cause now identified — previous treatments were too generic'
          : 'Hormonal profile with a clear, addressable cause';
      }

      h3 = dur() >= 2
        ? 'Recovery possible even after extended erectile difficulties'
        : 'High likelihood of visible results within 3 weeks';

      container.innerHTML =
        '<div class="mid-card">' +
          '<div class="mid-icon">&#x26A1;</div>' +
          '<div class="mid-badge">Analysis Almost Complete</div>' +
          '<div class="mid-title">Your profile shows <span>' + titleInner + '</span></div>' +
          '<p class="mid-body">' + body + '</p>' +
          '<div class="mid-highlights">' +
            '<div class="mid-highlight-item"><div class="dot"></div>' + h1 + '</div>' +
            '<div class="mid-highlight-item"><div class="dot"></div>Profile compatible with fast hormonal and vascular recovery</div>' +
            '<div class="mid-highlight-item"><div class="dot"></div>' + h3 + '</div>' +
          '</div>' +
          '<button class="btn-continue" onclick="continueMid()">See your personalized protocol &rarr;</button>' +
        '</div>';
    }

    function continueMid() {
      qHistory.push('MID');
      currentQId = 'q11';
      progressArea.style.display = 'block';
      renderQuestion('q11');
    }

    // ─────────────────────────────────────────────
    //  Result — adaptive
    // ─────────────────────────────────────────────
    function showResult() {
      progressArea.style.display = 'none';
      showBack(false);

      var title, body;

      if (isYoung() && impact() <= 1) {
        title = 'Your performance <span>can be fully restored</span> — and your confidence with it';
        body  = "Congratulations on completing the assessment! Men your age with a profile like yours have one of the strongest recovery rates of any group. The Testofy Protocol is designed to target the exact hormonal and lifestyle triggers that cause ED in younger men — 100% natural, no side effects, and most users see results in under 3 weeks.";
      } else if (isSenior() && sev() >= 2) {
        title = "It's not too late — your performance <span>can be fully restored</span>";
        body  = "Congratulations on completing the assessment! Men in their 40s and 50s routinely restore full erectile function with the right protocol — even after years of difficulties. The Testofy Protocol targets testosterone, blood flow and nitric oxide production at the root. 100% natural, with no side effects, and most users report visible improvement in under 30 days.";
      } else {
        title = 'Your performance <span>can be fully restored</span> in as little as 3 weeks';
        body  = "Congratulations on completing the assessment! Based on your profile, the Testofy Protocol is designed to reactivate your body's natural testosterone production, improve blood flow, and restore erectile function at the root. Our method is 100% natural, with no side effects — and most users report visible results in under 30 days.";
      }

      container.innerHTML =
        '<div class="result-card">' +
          '<div class="result-icon">&#x1F3C6;</div>' +
          '<div class="result-badge">You Are an Ideal Candidate</div>' +
          '<div class="result-title">' + title + '</div>' +
          '<p class="result-body">' + body + '</p>' +
          '<div class="result-features">' +
            '<div class="result-feature"><span class="f-icon">&#x1F33F;</span>100% Natural</div>' +
            '<div class="result-feature"><span class="f-icon">&#x23F1;</span>Results in 3 weeks</div>' +
            '<div class="result-feature"><span class="f-icon">&#x1F525;</span>Boosts Testosterone</div>' +
            '<div class="result-feature"><span class="f-icon">&#x2705;</span>No side effects</div>' +
          '</div>' +
          '<button class="btn-cta" onclick="handleCTA()">Get the full Testofy Protocol now &rarr;</button>' +
          '<p class="cta-sub">Limited access &bull; Secure checkout &bull; Results in 3 weeks</p>' +
        '</div>';
    }

    function handleCTA() {
      window.location.href = CHECKOUT;
    }

    // ── INIT ──
    renderQuestion('q1');

    // ── BACK BUTTON REDIRECT ──
    history.pushState(null, '', location.href);
    window.addEventListener('popstate', function() {
      history.pushState(null, '', location.href);
      window.location.replace(CHECKOUT);
    });
  </script>
</body>
</html>
